<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ウィッシュリスト</title>
    <link rel="stylesheet" href="./popup.css">
  </head>
  <body class="asw-popup-body">
    <main class="asw-popup">
      <header class="asw-popup__header">
        <div>
          <p class="asw-popup__eyebrow">App Store Wishlist</p>
          <h1 class="asw-popup__title">ウィッシュリスト</h1>
          <p class="asw-popup__subtitle" id="subtitle">保存件数</p>
        </div>
        <div class="asw-popup__count" id="count">0 件</div>
      </header>

      <section class="asw-popup__controls">
        <label class="asw-field">
          <span class="asw-field__label">検索</span>
          <input id="searchInput" class="asw-field__input" type="search" aria-label="ウィッシュリストを検索">
        </label>
        <label class="asw-field">
          <span class="asw-field__label">並び順</span>
          <select id="sortSelect" class="asw-field__input" aria-label="並び順を選択"></select>
        </label>
        <p id="resultsSummary" class="asw-popup__results" aria-live="polite"></p>
      </section>

      <section id="errorBox" class="asw-popup__error" hidden>
        <p id="errorMessage"></p>
        <button type="button" id="reloadButton" class="asw-inline-button">再読み込み</button>
      </section>

      <section id="listContainer" class="asw-popup__list" aria-live="polite"></section>

      <footer class="asw-popup__footer">
        <button type="button" id="exportButton" class="asw-inline-button">書き出し</button>
        <button type="button" id="optionsButton" class="asw-inline-button">設定</button>
      </footer>
    </main>
    <dialog id="editorDialog" class="asw-dialog">
      <form method="dialog" id="editorForm" class="asw-dialog__form">
        <header class="asw-dialog__header">
          <div>
            <p class="asw-dialog__eyebrow">App Store Wishlist</p>
            <h2 id="editorDialogTitle" class="asw-dialog__title">メモとタグを編集</h2>
          </div>
          <button type="button" id="editorCloseButton" class="asw-inline-button" aria-label="閉じる">閉じる</button>
        </header>
        <label class="asw-field">
          <span class="asw-field__label">メモ</span>
          <textarea id="editorNoteInput" class="asw-field__textarea" rows="5"></textarea>
        </label>
        <label class="asw-field">
          <span class="asw-field__label">タグ</span>
          <input id="editorTagsInput" class="asw-field__input" type="text">
        </label>
        <footer class="asw-dialog__footer">
          <button type="button" id="editorCancelButton" class="asw-inline-button">キャンセル</button>
          <button type="submit" id="editorSaveButton" class="asw-inline-button asw-inline-button--primary">保存</button>
        </footer>
      </form>
    </dialog>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
